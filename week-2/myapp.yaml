services:
  db:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres} # Default value is 'postgres' if not set in .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password} # Default value is 'password' if not set in .env
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}  # Default value is 'mydatabase' if not set in .env
    ports:
      - "5432:5432"
    volumes:
      - ./Postgres_setup/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  backend:
    build: ./backend
    container_name: fastapi_backend
    env_file: 
        - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always